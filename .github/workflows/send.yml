name: thunder-miri-sender

on:
  schedule:
    - cron: "*/10 * * * *"   # 10분마다 (주기 실행이라 UTC/KST 무관)
  workflow_dispatch:          # 버튼으로 수동 실행 (mode 선택 가능)
    inputs:
      mode:
        description: "once=실제 천둥감지, test=전 구독자에 테스트 푸시"
        type: choice
        options: [once, test]
        default: once

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r sender/requirements.txt
      - name: run sender
        run: python sender/sender.py --${{ inputs.mode || 'once' }}
        env:
          TZ: Asia/Seoul   # 발송 서버를 한국시간으로 (UTC면 기상청 예보 시각이 9시간 어긋남)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
